<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Léon — Expert Piscine · Pays de Château-Gontier</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Inter:wght@300;400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f4f1ec;
  --card:#ffffff;
  --teal:#1d6b5f;
  --teal-dark:#0f4a40;
  --teal-light:#e8f4f1;
  --teal-mid:#2d8c7d;
  --accent:#c96b45;
  --accent-light:#fdf0ea;
  --text:#1a2a28;
  --muted:#637070;
  --border:#e2ddd6;
  --radius:14px;
  --radius-sm:9px;
  --shadow:0 2px 16px rgba(15,74,64,.08);
  --shadow-hover:0 6px 28px rgba(15,74,64,.14);
}

html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* ── GRAIN ── */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

/* ── SHELL ── */
.shell{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

/* ── CARD ── */
.card{background:var(--card);border-radius:20px;box-shadow:var(--shadow);width:100%;max-width:520px;overflow:hidden;display:flex;flex-direction:column;max-height:calc(100vh - 40px)}

/* ── TOP BAR ── */
.topbar{background:var(--teal-dark);padding:18px 22px 14px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.avatar-wrap{position:relative;flex-shrink:0}
.avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2.5px solid rgba(255,255,255,.2);display:block}
.avatar-fallback{width:52px;height:52px;border-radius:50%;background:var(--teal-mid);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#fff;border:2.5px solid rgba(255,255,255,.2)}
.online-dot{position:absolute;bottom:2px;right:2px;width:11px;height:11px;background:#4ade80;border-radius:50%;border:2px solid var(--teal-dark)}
.topbar-info{flex:1}
.topbar-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:#fff;line-height:1.2}
.topbar-sub{font-size:11.5px;color:rgba(255,255,255,.55);margin-top:2px}
.badge{display:inline-block;margin-top:5px;font-size:10.5px;font-weight:500;padding:2px 8px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border-radius:20px;border:1px solid rgba(255,255,255,.15)}

/* ── PROGRESS ── */
.prog-wrap{height:3px;background:rgba(29,107,95,.12);flex-shrink:0}
.prog-bar{height:3px;background:linear-gradient(90deg,var(--teal-mid),var(--accent));border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── STEP COUNTER ── */
.step-meta{padding:14px 24px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.step-count{font-size:11.5px;color:var(--muted);font-weight:500;letter-spacing:.3px}
.step-dots{display:flex;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .3s}
.dot.done{background:var(--teal-mid)}
.dot.active{background:var(--teal);width:18px;border-radius:3px}

/* ── SCREEN ── */
.screen{flex:1;overflow-y:auto;padding:16px 24px 20px;display:flex;flex-direction:column}
.screen::-webkit-scrollbar{width:3px}
.screen::-webkit-scrollbar-thumb{background:rgba(29,107,95,.15);border-radius:2px}

/* ── LEON MESSAGE ── */
.leon-msg{display:flex;gap:10px;margin-bottom:16px;animation:fadeUp .35s ease forwards;opacity:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.leon-micro{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;margin-top:2px;border:1.5px solid var(--border)}
.leon-micro-fb{width:28px;height:28px;border-radius:50%;background:var(--teal-mid);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px}
.bubble{background:var(--teal-light);border:1px solid rgba(29,107,95,.12);border-radius:14px;border-top-left-radius:4px;padding:11px 14px;font-size:14.5px;line-height:1.55;color:var(--text);max-width:88%}

/* ── QUESTION LABEL ── */
.q-label{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:18px;padding-top:4px}

/* ── CHOICE CARDS ── */
.choices{display:flex;flex-direction:column;gap:9px;margin-top:4px}
.choices.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}

.choice{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:13px 16px;cursor:pointer;transition:all .18s;text-align:left;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.04);-webkit-tap-highlight-color:transparent}
.choice:hover{border-color:var(--teal-mid);background:var(--teal-light);transform:translateY(-1px);box-shadow:var(--shadow-hover)}
.choice:active{transform:translateY(0)}
.choice.sel{border-color:var(--teal);background:var(--teal-light)}
.choice-ico{font-size:22px;flex-shrink:0;line-height:1}
.choice-txt{line-height:1.35}
.choice-txt strong{display:block;font-weight:500;font-size:14px}
.choice-txt span{display:block;font-size:12px;color:var(--muted);margin-top:1px}

/* ── TEXT INPUT ── */
.input-row{display:flex;gap:8px;align-items:flex-end;margin-top:4px}
.txt-input{flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-family:'Inter',sans-serif;font-size:14.5px;color:var(--text);background:#fff;outline:none;transition:border-color .18s;line-height:1.4}
.txt-input:focus{border-color:var(--teal-mid)}
.txt-input::placeholder{color:#aab5b5}
.send{width:44px;height:44px;border-radius:50%;background:var(--teal);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;box-shadow:0 2px 10px rgba(15,74,64,.25)}
.send:hover{background:var(--teal-dark);transform:scale(1.05)}
.send:active{transform:scale(.97)}
.send svg{fill:#fff;width:17px;height:17px}

/* ── FORM ── */
.form-fields{display:flex;flex-direction:column;gap:12px;margin-top:4px}
.field-wrap label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:4px;letter-spacing:.2px}
.field-wrap input{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);background:#fff;outline:none;transition:border-color .18s}
.field-wrap input:focus{border-color:var(--teal-mid)}
.field-wrap input::placeholder{color:#aab5b5}
.field-wrap input.err{border-color:var(--accent)}
.consent{display:flex;gap:10px;align-items:flex-start;margin-top:4px;background:var(--teal-light);border:1px solid rgba(29,107,95,.15);border-radius:var(--radius-sm);padding:11px 13px}
.consent input[type=checkbox]{margin-top:2px;accent-color:var(--teal);flex-shrink:0;width:15px;height:15px;cursor:pointer}
.consent-txt{font-size:12px;color:var(--muted);line-height:1.5}

/* ── BRIEF CARD ── */
.brief-card{background:var(--teal-light);border:1.5px solid rgba(29,107,95,.18);border-radius:var(--radius);padding:16px;margin-top:4px}
.brief-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--teal-dark);margin-bottom:12px;letter-spacing:.2px;text-transform:uppercase}
.brief-row{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid rgba(29,107,95,.1);font-size:13.5px}
.brief-row:last-child{border-bottom:none}
.bk{color:var(--muted);min-width:110px;flex-shrink:0}
.bv{color:var(--text);font-weight:400}

/* ── CTA ── */
.cta{width:100%;padding:13px;background:var(--teal);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:14.5px;font-weight:500;cursor:pointer;transition:all .18s;margin-top:12px;box-shadow:0 3px 12px rgba(15,74,64,.2);display:flex;align-items:center;justify-content:center;gap:8px}
.cta:hover{background:var(--teal-dark);transform:translateY(-1px);box-shadow:0 5px 18px rgba(15,74,64,.28)}
.cta:active{transform:translateY(0)}
.cta.secondary{background:#fff;color:var(--teal);border:1.5px solid var(--teal);box-shadow:none}
.cta.secondary:hover{background:var(--teal-light)}


.process-steps{display:flex;align-items:flex-start;margin:8px 0 20px;position:relative}
.process-step{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;z-index:1}
.process-step:not(:last-child)::after{content:'';position:absolute;top:20px;left:calc(50% + 20px);right:calc(-50% + 20px);height:2px;background:var(--border);z-index:0}
.ps-icon{width:40px;height:40px;border-radius:50%;background:var(--teal-light);border:2px solid var(--teal-mid);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:8px;position:relative;z-index:1}
.ps-icon.done{background:var(--teal-mid);border-color:var(--teal-dark)}
.ps-label{font-size:11.5px;font-weight:500;color:var(--text);line-height:1.3;margin-bottom:2px}
.ps-sub{font-size:10.5px;color:var(--muted);line-height:1.3}

/* ── CONFIRM ── */
.confirm-wrap{display:flex;flex-direction:column;align-items:center;padding:28px 20px 20px;text-align:center;gap:14px}
.confirm-circle{width:72px;height:72px;background:var(--teal-light);border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid rgba(29,107,95,.2);animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.confirm-ico{font-size:32px}
.confirm-h{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--text)}
.confirm-p{font-size:14px;color:var(--muted);line-height:1.6;max-width:320px}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:2px}
.chip{font-size:12px;padding:5px 12px;background:var(--teal-light);color:var(--teal-dark);border-radius:20px;border:1px solid rgba(29,107,95,.18);font-weight:500}

/* ── HORSZONE ── */
.hz-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:16px 0 8px;text-align:center}
.hz-icon{font-size:36px}
.hz-text{font-size:14px;color:var(--muted);line-height:1.55;max-width:300px}
.email-row{display:flex;gap:8px;width:100%;max-width:320px}
.email-row input{flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-family:'Inter',sans-serif;font-size:13.5px;outline:none}
.email-row input:focus{border-color:var(--teal-mid)}
.email-btn{padding:10px 14px;background:var(--teal);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}

/* ── BACK LINK ── */
.back-btn{background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:5px;padding:0;margin-bottom:4px;transition:color .15s}
.back-btn:hover{color:var(--teal)}

/* ── ANIM ── */
.screen-in{animation:screenIn .3s ease forwards}
@keyframes screenIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

@media(max-height:680px){.topbar{padding:12px 18px 10px}.avatar{width:42px;height:42px}.topbar-name{font-size:15px}.q-label{font-size:16px}.screen{padding:12px 20px 16px}}
@media(max-width:360px){.choices.grid2{grid-template-columns:1fr}}
</style>
</head>

const COMMUNES = [

function normalize(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[-']/g,' ')}
function inZone(v){const n=normalize(v);return COMMUNES.some(c=>{const m=normalize(c);return m===n||m.startsWith(n)||n.startsWith(m.split(' ')[0])})}
function findCommune(v){const n=normalize(v);return COMMUNES.find(c=>{const m=normalize(c);return m===n||m.startsWith(n)||n.startsWith(m.split(' ')[0])})||v}

const screen=document.getElementById('screen');
const prog=document.getElementById('prog');
const stepMeta=document.getElementById('stepMeta');
const stepCount=document.getElementById('stepCount');
const stepDots=document.getElementById('stepDots');

function setProgress(val,step,total){
  prog.style.width=val+'%';
  if(step>0&&step<=total){
    stepMeta.style.display='flex';
    stepCount.textContent='Étape '+step+' sur '+total;
    stepDots.innerHTML='';
    for(let i=1;i<=total;i++){
      const d=document.createElement('div');
      d.className='dot'+(i<step?' done':i===step?' active':'');
      stepDots.appendChild(d);
    }
  }else{
    stepMeta.style.display='none';
  }
}

function render(html,step=0,prog=8){
  screen.innerHTML='<div class="screen-in">'+html+'</div>';
  setProgress(prog,step,TOTAL_STEPS);
  screen.scrollTop=0;
}

/* ───── ÉTAPE 0 — Accueil ───── */
function s0(){
  state.step=0;
  render(`
    ${leonMsg("Bonjour&nbsp;! Je suis <strong>Léon</strong>, ton expert Maison &amp; Jardin dans le Pays de Château-Gontier. Je connais les artisans du coin et je peux t'aider à trouver le bon spécialiste pour ton projet.")}
    <div class="q-label" style="margin-top:8px">C'est quoi ton projet ?</div>
    <div class="choices">
      <div class="choice" onclick="s0pick('piscine')">
        <span class="choice-ico">🏊</span>
        <div class="choice-txt"><strong>Construire ou rénover une piscine</strong><span>Installation, rénovation, spa</span></div>
      </div>
      <div class="choice" onclick="s0pick('jardin')">
        <span class="choice-ico">🌿</span>
        <div class="choice-txt"><strong>Aménager mon jardin / extérieur</strong><span>Terrasse, allée, paysagisme</span></div>
      </div>
      <div class="choice" onclick="s0pick('travaux')">
        <span class="choice-ico">🏗️</span>
        <div class="choice-txt"><strong>Travaux intérieur / rénovation</strong><span>Plomberie, électricité, maçonnerie</span></div>
      </div>
      <div class="choice" onclick="s0pick('autre')">
        <span class="choice-ico">💬</span>
        <div class="choice-txt"><strong>Autre chose</strong><span>Dis-moi ton projet</span></div>
      </div>
    </div>
  `,0,8);
}

function s0pick(v){
  if(v==='piscine'){s1()}
  else{
    render(`
      ${leonMsg("En V1, je suis spécialisé sur les projets piscine et aménagement extérieur pour le Pays de Château-Gontier. Pour d'autres projets, la plateforme s'agrandit bientôt&nbsp;!")}
      <button class="cta secondary" onclick="s0()" style="margin-top:16px">← Choisir un autre projet</button>
    `,0,8);
  }
}

/* ───── ÉTAPE 1 — Commune ───── */
function s1(){
  state.step=1;
  const opts=COMMUNES.map(c=>`<option value="${c}">${c}</option>`).join('');
  render(`
    ${leonMsg("Super ! Je vais te poser quelques questions rapides pour cerner ton projet et t’orienter vers les piscinistes qui correspondent le mieux à ce que tu cherches.")}
    <div class="q-label">Tu es sur quelle <strong style="color:var(--teal)">commune</strong> ?</div>
    <div style="position:relative;margin-top:4px">
      <select id="communeSelect" onchange="s1selectChange()" style="width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-family:'Inter',sans-serif;font-size:14.5px;color:var(--text);background:#fff;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer;transition:border-color .18s">
        <option value="">— Sélectionne ta commune —</option>
        ${opts}
      </select>
      <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:12px">▼</span>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-top:8px">Périmètre d’intervention : ~20 km autour de Château-Gontier</div>
    <button class="cta" id="s1next" onclick="s1submit()" style="margin-top:12px;opacity:0.4;pointer-events:none">Continuer →</button>
  `,1,15);
}

function s1selectChange(){
  const val=document.getElementById('communeSelect')?.value||'';
  const btn=document.getElementById('s1next');
  if(btn){btn.style.opacity=val?'1':'0.4';btn.style.pointerEvents=val?'auto':'none';}
}

function s1submit(){
  const val=(document.getElementById('communeSelect')?.value||'').trim();
  if(!val)return;
  state.commune=val;
  if(state._fromRecap){state._fromRecap=false;s5b();}else{s2();}
}

function s1horszone(commune){
  render(`

  const emailOk=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
  document.getElementById('fPrenom')?.classList.toggle('err',!p);
  document.getElementById('fNom')?.classList.toggle('err',!n);
  document.getElementById('fEmail')?.classList.toggle('err',!emailOk);
  document.getElementById('fTel')?.classList.toggle('err',!telOk);
  const errEl=document.getElementById('formErr');
  if(errEl) errEl.textContent=!telOk?'Numéro invalide — format attendu : 06 ou 07 suivi de 8 chiffres':!emailOk?'Adresse email invalide':'';

      <div class="brief-row" style="align-items:center"><span class="bk">Email</span><span class="bv" style="flex:1">${state.email||'—'}</span><button onclick="s7edit('email')" style="background:none;border:none;cursor:pointer;font-size:11.5px;color:var(--teal);padding:0;flex-shrink:0">Modifier</button></div>

    </div>
    <div id="rgpdErr" style="font-size:12px;color:var(--accent);margin-top:4px;min-height:14px"></div>
    <button class="cta" onclick="sConfirmCheck()" style="margin-top:4px">✅ Valider et envoyer mon projet</button>
  `,8,100);
}

function s7edit(field){
  const labels={prenom:'Prénom',nom:'Nom',email:'Email',tel:'Mobile'};
  const types={prenom:'text',nom:'text',email:'email',tel:'tel'};
  const current={prenom:state.prenom||'',nom:state.nom||'',email:state.email||'',tel:state.tel||''};
  const zone=document.getElementById('s7editZone');
  if(!zone)return;
  zone.innerHTML=`<div class="brief-card" style="margin-top:6px;background:#fff">
    <div style="font-size:12.5px;font-weight:500;color:var(--muted);margin-bottom:8px">Éditer : ${labels[field]}</div>
    <input type="${types[field]}" id="s7editInput" value="${current[field]}" style="width:100%;border:1.5px solid var(--teal-mid);border-radius:var(--radius-sm);padding:10px 12px;font-family:'Inter',sans-serif;font-size:14px;outline:none">
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="cta" onclick="s7save('${field}')" style="margin-top:0;flex:1">Enregistrer</button>
      <button class="cta secondary" onclick="document.getElementById('s7editZone').innerHTML=''" style="margin-top:0;flex:1">Annuler</button>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById('s7editInput')?.focus(),50);
}

function s7save(field){
  const val=(document.getElementById('s7editInput')?.value||'').trim();
  if(!val)return;
  state[field]=val;
  s7();
}

function sConfirmCheck(){
  const ok=document.getElementById('rgpdConsent')?.checked;
  const err=document.getElementById('rgpdErr');
  if(!ok){if(err)err.textContent='Merci de cocher la case pour continuer.';return;}
  if(err)err.textContent='';
  sConfirm();
}
