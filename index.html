<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Léon — Expert Maison & Jardin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --vert: #2D5016; --vert-clair: #4A7C2F; --vert-pale: #EEF4E8;
    --creme: #FAF8F3; --gris: #6B7280; --gris-clair: #F3F4F6;
    --blanc: #FFFFFF; --texte: #1C2B0E; --bordure: #D4E4C0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--creme); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 0 0 80px 0; }
  .header { width: 100%; background: var(--vert); padding: 16px 24px; display: flex; align-items: center; gap: 14px; }
  .leon-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--vert-clair); border: 2px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .leon-info h1 { font-family: 'Playfair Display', serif; font-size: 18px; color: white; font-weight: 600; line-height: 1.2; }
  .leon-info p { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 2px; }
  .status-dot { width: 8px; height: 8px; background: #6EE37A; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .progress-bar { width: 100%; height: 3px; background: var(--bordure); }
  .progress-fill { height: 100%; background: var(--vert-clair); transition: width 0.5s ease; }
  .chat-zone { width: 100%; max-width: 600px; padding: 24px 16px 0; display: flex; flex-direction: column; gap: 20px; }
  .bulle-leon { display: flex; gap: 10px; align-items: flex-end; animation: apparaitre 0.35s ease both; }
  .bulle-leon .avatar-sm { width: 32px; height: 32px; border-radius: 50%; background: var(--vert); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .bulle-leon .texte { background: var(--blanc); border: 1px solid var(--bordure); border-radius: 18px 18px 18px 4px; padding: 12px 16px; font-size: 15px; color: var(--texte); line-height: 1.5; max-width: calc(100% - 50px); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .bulle-user { display: flex; justify-content: flex-end; animation: apparaitre 0.3s ease both; }
  .bulle-user .texte { background: var(--vert); color: white; border-radius: 18px 18px 4px 18px; padding: 12px 16px; font-size: 15px; line-height: 1.5; max-width: 85%; }
  .choix-zone { display: flex; flex-wrap: wrap; gap: 8px; padding-left: 42px; animation: apparaitre 0.4s ease both; }
  .btn-choix { background: var(--blanc); border: 1.5px solid var(--bordure); border-radius: 24px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--vert); cursor: pointer; transition: all 0.18s; font-weight: 500; }
  .btn-choix:hover:not(:disabled) { background: var(--vert-pale); border-color: var(--vert-clair); }
  .btn-choix:disabled { opacity: 0.38; cursor: not-allowed; }
  .sep-bientot { width: 100%; font-size: 12px; color: var(--gris); margin: 6px 0 2px; }
  .input-zone { padding-left: 42px; animation: apparaitre 0.4s ease both; }
  .input-wrap { display: flex; gap: 8px; align-items: flex-end; }
  .input-texte { flex: 1; border: 1.5px solid var(--bordure); border-radius: 12px; padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--texte); background: var(--blanc); outline: none; resize: none; min-height: 46px; max-height: 200px; transition: border-color 0.18s; }
  .input-texte.grande { min-height: 90px; }
  .input-texte:focus { border-color: var(--vert-clair); }
  .btn-envoyer { width: 44px; height: 44px; border-radius: 50%; background: var(--vert); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .btn-envoyer svg { width: 18px; height: 18px; fill: white; }
  .typing { display: flex; gap: 10px; align-items: center; animation: apparaitre 0.3s ease both; }
  .typing .avatar-sm { width: 32px; height: 32px; border-radius: 50%; background: var(--vert); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .typing-dots { background: var(--blanc); border: 1px solid var(--bordure); border-radius: 18px 18px 18px 4px; padding: 12px 18px; display: flex; gap: 5px; align-items: center; }
  .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--gris); animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  .recap-card { background: var(--blanc); border: 1.5px solid var(--bordure); border-radius: 16px; padding: 18px; margin-left: 42px; animation: apparaitre 0.4s ease both; }
  .recap-card h3 { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--vert); margin-bottom: 12px; }
  .recap-ligne { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--gris-clair); font-size: 14px; }
  .recap-ligne:last-child { border-bottom: none; }
  .recap-label { color: var(--gris); flex-shrink: 0; width: 130px; }
  .recap-valeur { color: var(--texte); font-weight: 500; }
  .barre-bas { position: fixed; bottom: 0; left: 0; right: 0; background: var(--blanc); border-top: 1px solid var(--bordure); padding: 12px 16px; display: flex; gap: 8px; align-items: flex-end; }
  .input-bas { flex: 1; border: 1.5px solid var(--bordure); border-radius: 24px; padding: 10px 16px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--texte); background: var(--gris-clair); outline: none; resize: none; line-height: 1.4; }
  .btn-send-bas { width: 42px; height: 42px; border-radius: 50%; background: var(--vert); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .btn-send-bas svg { width: 16px; height: 16px; fill: white; }
  @keyframes apparaitre { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
</style>
</head>
<body>

<div class="header">
  <div class="leon-avatar">🌿</div>
  <div class="leon-info">
    <h1>Léon</h1>
    <p><span class="status-dot"></span>Expert Maison &amp; Jardin · Pays de Château-Gontier</p>
  </div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
<div class="chat-zone" id="chatZone"></div>
<div style="height:80px"></div>

<div class="barre-bas">
  <textarea class="input-bas" id="inputBas" placeholder="Écrivez votre message…" rows="1" disabled></textarea>
  <button class="btn-send-bas" disabled>
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
var MAKE_WEBHOOK = 'https://hook.eu1.make.com/npe4wnn7rhvvarsq6km3y938t7oe7l4u';

var etat = {
  donnees: {
    commune: null, descriptionLibre: null, typeProjet: null,
    typePiscine: null, dimensions: null, accessibilite: null,
    budget: null, delai: null,
    prenom: null, email: null, telephone: null
  },
  questionsRestantes: ['typePiscine', 'dimensions', 'accessibilite', 'budget', 'delai']
};

var COMMUNES = [
  'chateau-gontier-sur-mayenne','chateau-gontier','chateau gontier',
  'aze','saint-fort','saint fort','bazouges',
  'bierne-les-villages','bierne les villages','bierne',
  'saint-laurent-des-mortiers','saint laurent des mortiers',
  'saint-michel-de-feins','saint michel de feins',
  'argenton-notre-dame','argenton notre dame','argenton',
  'chatelain','chemaze','daon',
  'gennes-longuefuye','gennes longuefuye','gennes-sur-glaize','gennes sur glaize','gennes',
  'longuefuye','houssay','menil','origne','peuton',
  'pree-d-anjou','pree d anjou','ampoigne','laigne',
  'la roche-neuville','la roche neuville','roche-neuville','roche neuville',
  'loigne-sur-mayenne','loigne sur mayenne','loigne',
  'saint-sulpice','saint-denis-d-anjou','saint denis d anjou','saint-denis',
  'senonnes','pays de chateau-gontier'
];

function normaliser(s) {
  return s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/'/g, ' ')
    .replace(/-/g, ' ');
}

function scroll() { setTimeout(function(){ window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }, 50); }
function setProgression(pct) { document.getElementById('progressFill').style.width = pct + '%'; }

function communeValide(texte) {
  var t = normaliser(texte).trim();
  return COMMUNES.some(function(c){ return t.includes(c); });
}

function extraireInfos(texte) {
  var t = normaliser(texte);
  var infos = {};

  if (t.includes('coque') || t.includes('polyester')) infos.typePiscine = 'Coque polyester';
  else if (t.includes('beton') || t.includes('beton arme')) infos.typePiscine = 'Béton armé';
  else if (t.includes('hors-sol') || t.includes('hors sol')) infos.typePiscine = 'Hors-sol';

  var dimMatch = t.match(/(\d+)\s*[x×]\s*(\d+)/);
  if (dimMatch) {
    var l = parseInt(dimMatch[1]);
    if (l < 6) infos.dimensions = 'Petite — pour se rafraîchir (< 6m)';
    else if (l <= 9) infos.dimensions = 'Moyenne — on peut nager (6-9m)';
    else infos.dimensions = 'Grande — pour faire des longueurs (> 9m)';
  } else if (t.includes('petite') || t.includes('petit') || t.includes('detendre') || t.includes('rafraichir') || t.includes('relaxer')) {
    infos.dimensions = 'Petite — pour se rafraîchir (< 6m)';
  } else if (t.includes('grande') || t.includes('longueur') || t.includes('sportif') || t.includes('sport')) {
    infos.dimensions = 'Grande — pour faire des longueurs (> 9m)';
  } else if (t.includes('moyenne') || t.includes('familiale') || t.includes('famille') || t.includes('nager')) {
    infos.dimensions = 'Moyenne — on peut nager (6-9m)';
  }

  if (t.includes('petit budget') || t.includes('pas cher') || t.includes('economique')) infos.budget = '< 20 000€';
  else if (t.match(/\b(20|25|30)\s*(k|000|mille)/)) infos.budget = '20 000 – 35 000€';
  else if (t.match(/\b(35|40|45)\s*(k|000|mille)/)) infos.budget = '35 000 – 50 000€';
  else if (t.match(/\b(50|60|70|80|100)\s*(k|000|mille)/)) infos.budget = '> 50 000€';

  if (t.includes('plus tot') || t.includes('urgent') || t.includes('vite')) infos.delai = 'Le plus tôt possible';
  else if (t.includes('6 mois') || t.includes('six mois')) infos.delai = 'Dans les 6 mois';
  else if (t.includes('1 an') || t.includes('un an')) infos.delai = 'Dans environ 1 an';
  else if (t.includes('renseigne') || t.includes('plus tard') || t.includes('pas presse')) infos.delai = 'Je me renseigne pour plus tard';

  if (t.includes('facile') || t.includes('large')) infos.accessibilite = 'Passage facile (> 3m)';
  else if (t.includes('etroit') || t.includes('difficile') || t.includes('serre')) infos.accessibilite = 'Passage étroit (< 3m)';

  return infos;
}

function ajouterBulleLeon(texte) {
  return new Promise(function(resolve) {
    var zone = document.getElementById('chatZone');
    var typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<div class="avatar-sm">🌿</div><div class="typing-dots"><span></span><span></span><span></span></div>';
    zone.appendChild(typing);
    scroll();
    setTimeout(function() {
      typing.remove();
      var div = document.createElement('div');
      div.className = 'bulle-leon';
      div.innerHTML = '<div class="avatar-sm">🌿</div><div class="texte">' + texte + '</div>';
      zone.appendChild(div);
      scroll();
      resolve();
    }, 900);
  });
}

function ajouterBulleUser(texte) {
  var zone = document.getElementById('chatZone');
  var div = document.createElement('div');
  div.className = 'bulle-user';
  div.innerHTML = '<div class="texte">' + texte + '</div>';
  zone.appendChild(div);
  scroll();
}

function afficherChoix(options, callback) {
  var zone = document.getElementById('chatZone');
  var div = document.createElement('div');
  div.className = 'choix-zone';
  options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'btn-choix';
    btn.textContent = opt;
    btn.onclick = function() { div.remove(); ajouterBulleUser(opt); callback(opt); };
    div.appendChild(btn);
  });
  zone.appendChild(div);
  scroll();
}

function afficherInputInline(placeholder, callback, grande) {
  var zone = document.getElementById('chatZone');
  var div = document.createElement('div');
  div.className = 'input-zone';
  var wrap = document.createElement('div');
  wrap.className = 'input-wrap';
  var ta = document.createElement('textarea');
  ta.className = grande ? 'input-texte grande' : 'input-texte';
  ta.placeholder = placeholder;
  ta.rows = 1;
  ta.oninput = function() { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; };
  var btn = document.createElement('button');
  btn.className = 'btn-envoyer';
  btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>';
  wrap.appendChild(ta); wrap.appendChild(btn); div.appendChild(wrap); zone.appendChild(div);
  function valider() {
    var val = ta.value.trim();
    if (!val) return;
    div.remove(); ajouterBulleUser(val); callback(val);
  }
  btn.onclick = valider;
  ta.onkeydown = function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); valider(); } };
  ta.focus(); scroll();
}

async function demarrer() {
  await ajouterBulleLeon("Bonjour 👋 Je suis <strong>Léon</strong>, ton expert Maison & Jardin dans le Pays de Château-Gontier. Je connais bien les artisans du coin. Je peux t'aider à <strong>trouver le bon spécialiste pour ton projet</strong> — construction, rénovation, équipement, aménagement intérieur ou extérieur.");
  await ajouterBulleLeon("Avant tout — tu es sur quelle commune ?");
  afficherInputInline('Ma commune…', traiterCommune);
}

var COMMUNES_AFFICHAGE = [
  "Ampoigné", "Azé", "Bazouges", "Bierné-les-Villages",
  "Châtelain", "Château-Gontier-sur-Mayenne", "Chemazé", "Daon",
  "Gennes-Longuefuye", "Houssay", "Laigné", "La Roche-Neuville",
  "Loigné-sur-Mayenne", "Ménil", "Origné", "Peuton",
  "Prée-d'Anjou", "Saint-Denis-d'Anjou", "Saint-Fort",
  "Saint-Laurent-des-Mortiers", "Saint-Michel-de-Feins",
  "Saint-Sulpice", "Senonnes"
];

function afficherListeCommunes() {
  var zone = document.getElementById('chatZone');
  var div = document.createElement('div');
  div.className = 'input-zone';

  var wrap = document.createElement('div');
  wrap.className = 'input-wrap';

  var sel = document.createElement('select');
  sel.className = 'input-texte';
  sel.style.minHeight = '46px';
  sel.style.cursor = 'pointer';

  var opt0 = document.createElement('option');
  opt0.value = '';
  opt0.textContent = 'Choisir ma commune…';
  opt0.disabled = true;
  opt0.selected = true;
  sel.appendChild(opt0);

  COMMUNES_AFFICHAGE.forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  });

  var btn = document.createElement('button');
  btn.className = 'btn-envoyer';
  btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>';

  wrap.appendChild(sel);
  wrap.appendChild(btn);
  div.appendChild(wrap);
  zone.appendChild(div);

  btn.onclick = function() {
    var val = sel.value;
    if (!val) return;
    div.remove();
    ajouterBulleUser(val);
    traiterCommune(val);
  };
  scroll();
}

async function traiterCommune(valeur) {
  etat.donnees.commune = valeur;
  if (!communeValide(valeur)) {
    await ajouterBulleLeon("Je ne connais pas <strong>" + valeur + "</strong>. 🤔");
    await ajouterBulleLeon("Je couvre les communes du <strong>Pays de Château-Gontier</strong>. Sélectionne ta commune dans la liste :");
    afficherListeCommunes();
    return;
  }
  setProgression(10);
  await ajouterBulleLeon("Super 👍 Quel type de travaux tu envisages ?");
  afficherTypeProjet();
}

function afficherTypeProjet() {
  var zone = document.getElementById('chatZone');
  var div = document.createElement('div');
  div.className = 'choix-zone';

  var btnDispo = document.createElement('button');
  btnDispo.className = 'btn-choix';
  btnDispo.textContent = '🏊 Je veux construire une piscine';
  btnDispo.onclick = function() {
    div.remove();
    ajouterBulleUser('🏊 Je veux construire une piscine');
    etat.donnees.typeProjet = 'piscine';
    traiterTypeProjet();
  };
  div.appendChild(btnDispo);

  var sep = document.createElement('div');
  sep.className = 'sep-bientot';
  sep.textContent = 'Bientôt disponible :';
  div.appendChild(sep);

  var bientot = [
    'Refaire mon allée ou ma terrasse',
    'Poser un portail ou clôturer mon terrain',
    'Mon jardin a besoin d\'aide',
    'Installer un spa ou un jacuzzi'
  ];
  bientot.forEach(function(label) {
    var btn = document.createElement('button');
    btn.className = 'btn-choix';
    btn.textContent = label;
    btn.disabled = true;
    div.appendChild(btn);
  });

  zone.appendChild(div);
  scroll();
}

async function traiterTypeProjet() {
  setProgression(20);
  await ajouterBulleLeon("Dis-moi en quelques mots ce que tu as en tête — taille, emplacement, style… tout ce que tu veux partager.");
  afficherInputInline('Ex : une coque polyester 8x4, jardin côté nord, budget autour de 30k…', traiterDescription, true);
}

async function traiterDescription(valeur) {
  etat.donnees.descriptionLibre = valeur;
  setProgression(30);
  var infos = extraireInfos(valeur);
  if (infos.typePiscine) etat.donnees.typePiscine = infos.typePiscine;
  if (infos.dimensions) etat.donnees.dimensions = infos.dimensions;
  if (infos.budget) etat.donnees.budget = infos.budget;
  if (infos.delai) etat.donnees.delai = infos.delai;
  if (infos.accessibilite) etat.donnees.accessibilite = infos.accessibilite;
  etat.questionsRestantes = etat.questionsRestantes.filter(function(q){ return !etat.donnees[q]; });
  if (etat.questionsRestantes.length > 0) {
    await ajouterBulleLeon("Super ! Quelques précisions pour bien orienter les piscinistes 🏊");
  }
  poserProchainQuestion();
}

async function poserProchainQuestion() {
  if (etat.questionsRestantes.length === 0) { afficherRecap(); return; }
  var q = etat.questionsRestantes.shift();
  var pct = 30 + ((5 - etat.questionsRestantes.length) / 5) * 40;
  setProgression(pct);

  if (q === 'typePiscine') {
    await ajouterBulleLeon("Tu as une idée du type de piscine ?");
    afficherChoix(['🐚 Coque polyester', '🧱 Béton armé', '🪣 Hors-sol', '❓ Pas encore décidé'],
      function(val){ etat.donnees.typePiscine = val; poserProchainQuestion(); });
  } else if (q === 'dimensions') {
    await ajouterBulleLeon("Quelle taille tu imagines ?");
    afficherChoix(['🚿 Petite — pour se rafraîchir (< 6m)', '🏊 Moyenne — on peut nager (6-9m)', '🌊 Grande — pour faire des longueurs (> 9m)', '❓ Pas encore décidé'],
      function(val){ etat.donnees.dimensions = val; poserProchainQuestion(); });
  } else if (q === 'accessibilite') {
    await ajouterBulleLeon("L'accès au jardin pour les engins de chantier, c'est comment ?");
    afficherChoix(['✅ Passage facile (> 3m)', '⚠️ Passage étroit (< 3m)', '🚧 Difficile à évaluer', '❓ Je ne sais pas'],
      function(val){ etat.donnees.accessibilite = val; poserProchainQuestion(); });
  } else if (q === 'budget') {
    await ajouterBulleLeon("Une idée de budget ?");
    afficherChoix(['< 20 000€', '20 000 – 35 000€', '35 000 – 50 000€', '> 50 000€', 'Pas encore défini'],
      function(val){ etat.donnees.budget = val; poserProchainQuestion(); });
  } else if (q === 'delai') {
    await ajouterBulleLeon("Quand voudrais-tu pouvoir te baigner ?");
    afficherChoix(['⚡ Le plus tôt possible', '📅 Dans les 6 mois', '🌱 Dans environ 1 an', '💭 Je me renseigne pour plus tard'],
      function(val){ etat.donnees.delai = val; poserProchainQuestion(); });
  }
}

async function afficherRecap() {
  // Supprimer un éventuel ancien récap
  var ancienRecap = document.getElementById('recapCard');
  if (ancienRecap) ancienRecap.remove();

  setProgression(75);
  var d = etat.donnees;
  await ajouterBulleLeon("Merci ! Voilà le résumé de ton projet avant que je le transmette aux piscinistes 👇");
  var zone = document.getElementById('chatZone');
  var card = document.createElement('div');
  card.className = 'recap-card';
  card.id = 'recapCard';
  card.innerHTML =
    '<h3>🏊 Projet piscine — ' + d.commune + '</h3>' +
    '<div class="recap-ligne"><span class="recap-label">Description</span><span class="recap-valeur">' + d.descriptionLibre + '</span></div>' +
    '<div class="recap-ligne"><span class="recap-label">Type</span><span class="recap-valeur">' + (d.typePiscine || '—') + '</span></div>' +
    '<div class="recap-ligne"><span class="recap-label">Dimensions</span><span class="recap-valeur">' + (d.dimensions || '—') + '</span></div>' +
    '<div class="recap-ligne"><span class="recap-label">Accès chantier</span><span class="recap-valeur">' + (d.accessibilite || '—') + '</span></div>' +
    '<div class="recap-ligne"><span class="recap-label">Budget</span><span class="recap-valeur">' + (d.budget || '—') + '</span></div>' +
    '<div class="recap-ligne"><span class="recap-label">Délai</span><span class="recap-valeur">' + (d.delai || '—') + '</span></div>';
  zone.appendChild(card);
  scroll();
  await ajouterBulleLeon("Ça te convient ? Je transmets ça aux piscinistes partenaires.");
  afficherChoix(['✅ Oui, transmettre mon projet', '✏️ Je veux modifier quelque chose'],
    function(val) {
      if (val.includes('Oui')) { collecterCoordonnees(); }
      else { proposerModification(); }
    });
}

async function proposerModification() {
  await ajouterBulleLeon("Qu'est-ce que tu veux modifier ?");
  afficherChoix([
    "Le type de piscine",
    "Les dimensions",
    "L'accès chantier",
    "Le budget",
    "Le délai"
  ], function(choix) {
    if (choix.includes("type")) reposerQuestion("typePiscine");
    else if (choix.includes("dimension")) reposerQuestion("dimensions");
    else if (choix.includes("acc")) reposerQuestion("accessibilite");
    else if (choix.includes("budget")) reposerQuestion("budget");
    else if (choix.includes("lai")) reposerQuestion("delai");
  });
}

async function reposerQuestion(champ) {
  etat.donnees[champ] = null;
  if (champ === "typePiscine") {
    await ajouterBulleLeon("Quel type de piscine alors ?");
    afficherChoix(["Coque polyester", "Béton armé", "Hors-sol", "Pas encore décidé"],
      function(val){ etat.donnees.typePiscine = val; afficherRecap(); });
  } else if (champ === "dimensions") {
    await ajouterBulleLeon("Quelle taille tu imagines ?");
    afficherChoix(["Petite — pour se rafraîchir (< 6m)", "Moyenne — on peut nager (6-9m)", "Grande — pour faire des longueurs (> 9m)", "Pas encore décidé"],
      function(val){ etat.donnees.dimensions = val; afficherRecap(); });
  } else if (champ === "accessibilite") {
    await ajouterBulleLeon("L'accès au jardin, c'est comment ?");
    afficherChoix(["Passage facile (> 3m)", "Passage étroit (< 3m)", "Difficile à évaluer", "Je ne sais pas"],
      function(val){ etat.donnees.accessibilite = val; afficherRecap(); });
  } else if (champ === "budget") {
    await ajouterBulleLeon("Ton budget ?");
    afficherChoix(["< 20 000€", "20 000 – 35 000€", "35 000 – 50 000€", "> 50 000€", "Pas encore défini"],
      function(val){ etat.donnees.budget = val; afficherRecap(); });
  } else if (champ === "delai") {
    await ajouterBulleLeon("Quand voudrais-tu pouvoir te baigner ?");
    afficherChoix(["Le plus tôt possible", "Dans les 6 mois", "Dans environ 1 an", "Je me renseigne pour plus tard"],
      function(val){ etat.donnees.delai = val; afficherRecap(); });
  }
}

async function collecterCoordonnees() {
  setProgression(85);
  await ajouterBulleLeon("Dernière étape — ton prénom ?");
  afficherInputInline('Ton prénom…', async function(prenom) {
    etat.donnees.prenom = prenom;
    await ajouterBulleLeon("Ton email, " + prenom + " ? Je t'envoie la synthèse de ton projet dessus.");
    afficherInputInline('Ton email…', async function(email) {
      etat.donnees.email = email;
      await ajouterBulleLeon("Et ton numéro de téléphone ?");
      afficherInputInline('Ton téléphone…', async function(tel) {
        etat.donnees.telephone = tel;
        setProgression(100);

        // Envoi vers Make
        var d = etat.donnees;
        var payload = {
          commune: d.commune,
          typeProjet: d.typeProjet,
          descriptionLibre: d.descriptionLibre,
          typePiscine: d.typePiscine,
          dimensions: d.dimensions,
          accessibilite: d.accessibilite,
          budget: d.budget,
          delai: d.delai,
          prenom: d.prenom,
          email: d.email,
          telephone: d.telephone
        };
        try {
          await fetch(MAKE_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        } catch(e) {
          console.error('Erreur envoi Make:', e);
        }

        await ajouterBulleLeon("C'est envoyé ! 🎉 Ton projet a été transmis à <strong>2 piscinistes partenaires</strong> dans le Pays de Château-Gontier.");
        await ajouterBulleLeon("Tu vas recevoir un récapitulatif par email. Tu seras contacté sous <strong>48h</strong>. Bonne piscine ! 🏊");
      });
    });
  });
}

window.addEventListener('load', function(){ setTimeout(demarrer, 400); });
</script>
