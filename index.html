<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Magnet — Le réflexe local du Pays de Château-Gontier</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=Inter:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f4f1ec;color:#1a2a28;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:20px;padding:48px 40px;max-width:480px;width:100%;text-align:center;box-shadow:0 2px 24px rgba(15,74,64,.08)}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#1d6b5f;margin-bottom:32px;letter-spacing:-.3px}
h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;line-height:1.3;margin-bottom:16px}
p{font-size:15px;color:#637070;line-height:1.65;margin-bottom:32px}
.form{display:flex;gap:8px;flex-direction:column}
input{width:100%;border:1.5px solid #e2ddd6;border-radius:10px;padding:13px 16px;font-family:'Inter',sans-serif;font-size:14.5px;color:#1a2a28;outline:none;transition:border-color .18s}
input:focus{border-color:#2d8c7d}
button{width:100%;padding:13px;background:#1d6b5f;color:#fff;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:background .18s}
button:hover{background:#0f4a40}
.sub{font-size:12px;color:#aab5b5;margin-top:16px}
@media(max-width:480px){.card{padding:36px 24px}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚡ Local Magnet</div>
  <h1>Le réflexe local du Pays de Château-Gontier</h1>
  <p>La plateforme qui connecte les habitants avec les meilleurs artisans et prestataires locaux. Bientôt disponible.</p>
  <div class="form">
    <input type="email" placeholder="ton@email.fr" id="emailInput">
    <button onclick="submit()">Me prévenir au lancement →</button>
  </div>
  <div class="sub">Pas de spam. Juste un email au lancement.</div>
</div>
<script>
function submit(){
  const v=document.getElementById('emailInput').value;
  if(!v)return;
  document.querySelector('.form').innerHTML='<p style="color:#1d6b5f;font-weight:500;font-size:15px">✅ Noté ! On te prévient dès l\'ouverture.</p>';
}
</script>
</body>
</html>
